server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/tokens/**

        - id: catch-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/catches/**,/api/spots/**,/api/comments/**