server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: http://user-service:8082
            predicates:
              - Path=/api/users/**

          - id: auth-service
            uri: http://auth-service:8081
            predicates:
              - Path=/api/auth/**,/api/tokens/**

          - id: catch-service
            uri: http://catch-service:8083
            predicates:
              - Path=/api/catches/**,/api/spots/**,/api/comments/**