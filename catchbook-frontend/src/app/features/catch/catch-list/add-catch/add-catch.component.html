<div class="page-container">

  <div class="page-header">
    <a routerLink="/catches" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1 class="page-title">Nouvelle prise</h1>
  </div>

  <div class="form-card">

    <div *ngIf="errorMessage" class="error-message">
      <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
    </div>

    <div class="form-group">
      <label for="fishName">Nom du poisson *</label>
      <input
        id="fishName"
        type="text"
        [(ngModel)]="fishName"
        placeholder="Ex: Bar, Dorade, Maquereau..."
        class="form-input"
      />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="fishWeight">Poids (kg) *</label>
        <input
          id="fishWeight"
          type="number"
          [(ngModel)]="fishWeight"
          placeholder="0.0"
          min="0"
          step="0.1"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="size">Taille (cm) *</label>
        <input
          id="size"
          type="number"
          [(ngModel)]="size"
          placeholder="0"
          min="0"
          class="form-input"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="catchDate">Date de la prise *</label>
      <input
        id="catchDate"
        type="datetime-local"
        [(ngModel)]="catchDate"
        class="form-input"
      />
    </div>

    <div class="form-group toggle-group">
      <div class="toggle-info">
        <label>Spot public</label>
        <span class="toggle-desc">Partager l'emplacement avec la communauté</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" [(ngModel)]="spotPublic" />
        <span class="slider"></span>
      </label>
    </div>



    <div class="form-group">
      <label>Photo (optionnel)</label>

      <div class="photo-upload" (click)="fileInput.click()">
        <img *ngIf="previewUrl" [src]="previewUrl" class="photo-preview" alt="preview" />
        <div *ngIf="!previewUrl" class="photo-placeholder">
          <i class="fa-solid fa-camera"></i>
          <span>Ajouter une photo</span>
        </div>
      </div>

      <input
        #fileInput
        type="file"
        accept="image/*"
        (change)="onFileSelected($event)"
        style="display: none"
      />
    </div>
    <button class="submit-btn" (click)="onSubmit()" [disabled]="isLoading">
      <span *ngIf="!isLoading">
        <i class="fa-solid fa-fish"></i> Enregistrer la prise
      </span>
      <span *ngIf="isLoading">
        <i class="fa-solid fa-spinner fa-spin"></i> Enregistrement...
      </span>
    </button>

  </div>
</div>
