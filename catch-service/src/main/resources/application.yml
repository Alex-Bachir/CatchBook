server:
  port: 8083

spring:
  application:
    name: catch-service

  datasource:
    url: jdbc:mysql://localhost:3306/catchbook_catch
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect