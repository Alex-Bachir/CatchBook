server:
  port: 8083

spring:
  application:
    name: catch-service

  cloud:
    compatibility-verifier:
      enabled: false
    consul:
      host: consul
      port: 8500
      discovery:
        service-name: ${spring.application.name}
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 15s

  datasource:
    url: jdbc:mysql://mysql:3306/catchbook_catch?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect